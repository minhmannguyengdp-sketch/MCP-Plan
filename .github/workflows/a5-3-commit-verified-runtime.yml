name: A5.3 Commit Verified Runtime Source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  commit-runtime-source:
    if: github.head_ref == 'a5-3-finalize-legacy-edge-caller' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: a5-3-finalize-legacy-edge-caller
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply deterministic runtime changes
        run: node scripts/finalize-a5-3-legacy-edge-caller.mjs

      - name: Verify Foundation after caller removal
        run: npm run verify:foundation

      - name: Build frontend with validated runtime config
        env:
          BACKEND_API_BASE_URL: http://127.0.0.1:3001
          BACKEND_API_TOKEN: 0123456789abcdef0123456789abcdef
          MCP_LEGACY_ACTOR_ID: service:ci:mcp-v1
          SUPABASE_URL: https://project.example.com
          SUPABASE_ANON_KEY: ci-publishable-key
        run: npm run build

      - name: Commit verified runtime files
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: A5.3 apply verified legacy Edge caller removal
          branch: a5-3-finalize-legacy-edge-caller
          file_pattern: 'apps/backend/server.js scripts/direct-db-mutation-retirements.json package.json test/a5-3-no-legacy-edge-caller.test.mjs docs/npp-plan/A5_3_EDGE_RETIREMENT.md'
