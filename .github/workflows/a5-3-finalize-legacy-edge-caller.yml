name: A5.3 Create Final Legacy Edge Caller PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-final-pr:
    if: github.head_ref == 'a5-3-finalize-legacy-edge-caller'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tooling branch
        uses: actions/checkout@v4
        with:
          ref: a5-3-finalize-legacy-edge-caller
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply deterministic final source changes
        run: node scripts/finalize-a5-3-legacy-edge-caller.mjs

      - name: Verify Foundation after caller removal
        run: npm run verify:foundation

      - name: Build frontend with validated runtime config
        env:
          BACKEND_API_BASE_URL: http://127.0.0.1:3001
          BACKEND_API_TOKEN: 0123456789abcdef0123456789abcdef
          MCP_LEGACY_ACTOR_ID: service:ci:mcp-v1
          SUPABASE_URL: https://project.example.com
          SUPABASE_ANON_KEY: ci-publishable-key
        run: npm run build

      - name: Remove one-time tooling from final diff
        run: |
          rm scripts/finalize-a5-3-legacy-edge-caller.mjs
          rm .github/workflows/a5-3-finalize-legacy-edge-caller.yml

      - name: Create final runtime pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: a5-3-final-legacy-edge-caller-removal
          base: main
          delete-branch: true
          commit-message: A5.3 remove legacy Edge fallback caller
          title: 'A5.3: remove legacy Edge fallback caller'
          body: |
            Final A5.3 runtime closure generated from the deterministic, fully verified source transformation.

            - removes the legacy backend helper that called Supabase Edge functions;
            - removes internal fallback result/add routes to the retired `mcp-day-8b3` function;
            - keeps canonical result/add ownership in the authenticated Foundation Gateway;
            - records the completed A5.2 caller retirement in the immutable audit ledger;
            - adds regression tests preventing the Edge caller from returning;
            - updates the A5.3 runbook status to VPS pull pending.

            The generating workflow ran full Foundation verification and a production frontend build before creating this PR. No temporary workflow or finalizer script is included in this PR.
          labels: foundation,a5
