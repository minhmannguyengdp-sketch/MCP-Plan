name: A5.3 Push Final Legacy Edge Caller Branch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  push-final-branch:
    if: github.head_ref == 'a5-3-finalize-legacy-edge-caller'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tooling branch
        uses: actions/checkout@v4
        with:
          ref: a5-3-finalize-legacy-edge-caller
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply deterministic final source changes
        run: node scripts/finalize-a5-3-legacy-edge-caller.mjs

      - name: Verify Foundation after caller removal
        run: npm run verify:foundation

      - name: Build frontend with validated runtime config
        env:
          BACKEND_API_BASE_URL: http://127.0.0.1:3001
          BACKEND_API_TOKEN: 0123456789abcdef0123456789abcdef
          MCP_LEGACY_ACTOR_ID: service:ci:mcp-v1
          SUPABASE_URL: https://project.example.com
          SUPABASE_ANON_KEY: ci-publishable-key
        run: npm run build

      - name: Remove one-time tooling from final diff
        run: |
          rm scripts/finalize-a5-3-legacy-edge-caller.mjs
          rm .github/workflows/a5-3-finalize-legacy-edge-caller.yml

      - name: Push verified final runtime branch
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: A5.3 remove legacy Edge fallback caller
          branch: a5-3-final-legacy-edge-caller-removal
          create_branch: true
          file_pattern: 'apps/backend/server.js scripts/direct-db-mutation-retirements.json package.json test/a5-3-no-legacy-edge-caller.test.mjs docs/npp-plan/A5_3_EDGE_RETIREMENT.md scripts/finalize-a5-3-legacy-edge-caller.mjs .github/workflows/a5-3-finalize-legacy-edge-caller.yml'
