name: A5.4.1 Build Dead Session Removal

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-verified-source:
    if: github.head_ref == 'a5-4-1-remove-dead-session-mutations'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply deterministic source removal
        run: node scripts/finalize-a5-4-1-remove-dead-session-mutations.mjs

      - name: Verify Foundation after removal
        run: npm run verify:foundation

      - name: Build frontend with validated runtime config
        env:
          BACKEND_API_BASE_URL: http://127.0.0.1:3001
          BACKEND_API_TOKEN: 0123456789abcdef0123456789abcdef
          MCP_LEGACY_ACTOR_ID: service:ci:mcp-v1
          SUPABASE_URL: https://project.example.com
          SUPABASE_ANON_KEY: ci-publishable-key
        run: npm run build

      - name: Upload verified final source
        uses: actions/upload-artifact@v4
        with:
          name: a5-4-1-verified-source
          if-no-files-found: error
          path: |
            apps/backend/server.js
            scripts/direct-db-mutation-retirements.json
            package.json
            test/a5-4-1-dead-session-mutations.test.mjs
            docs/npp-plan/A5_4_DIRECT_REST_MIGRATION.md
