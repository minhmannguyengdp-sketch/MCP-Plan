name: A5.4.2 Register RPC Boundaries

on:
  push:
    branches:
      - a5-4-2-session-report-owner

permissions:
  contents: write

jobs:
  register-session-report-rpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Register audited RPC fingerprints
        run: node scripts/a5-4-2-register-rpc-boundaries.mjs
      - name: Commit guarded baseline update
        shell: bash
        run: |
          if git diff --quiet -- scripts/direct-db-mutation-baseline.json; then
            echo "No baseline update needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/direct-db-mutation-baseline.json
          git commit -m "audit: register session report RPC boundaries"
          git push origin HEAD:a5-4-2-session-report-owner
