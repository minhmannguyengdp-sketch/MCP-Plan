name: A5.4.2 Source Rewrite

on:
  push:
    branches:
      - a5-4-2-session-report-owner

permissions:
  contents: write

jobs:
  rewrite-legacy-session-report-owner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Remove unreachable legacy AI-result writer
        run: node scripts/a5-4-2-rewrite-server.mjs
      - name: Commit guarded rewrite
        shell: bash
        run: |
          if git diff --quiet -- apps/backend/server.js; then
            echo "No rewrite needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/backend/server.js
          git commit -m "refactor: remove legacy session report AI writer"
          git push origin HEAD:a5-4-2-session-report-owner
