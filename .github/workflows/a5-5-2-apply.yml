name: A5.5.2 Apply Patch

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'feat/a5-5-2-session-actions'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply reviewed patch as one commit
        shell: bash
        run: |
          set -euo pipefail
          cat .github/a5-5-2-patch/part-*.b64 | base64 -d | gzip -d > /tmp/a5-5-2.patch
          git apply --check /tmp/a5-5-2.patch
          git apply /tmp/a5-5-2.patch
          rm -rf .github/a5-5-2-patch
          rm -f .github/workflows/a5-5-2-source-export.yml
          rm -f .github/workflows/a5-5-2-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: onboard session actions to A5.5.2 idempotency"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
