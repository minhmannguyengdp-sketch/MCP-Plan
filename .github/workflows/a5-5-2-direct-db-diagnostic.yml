name: A5.5.2 Direct DB Diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/a5-5-2-direct-db-diagnostic.yml"
      - "test/audit-direct-db-mutations.test.mjs"
      - "test/direct-db-retirement-subphase.test.mjs"
      - "scripts/audit-direct-db-mutations.mjs"
      - "scripts/audit-direct-db-mutation-policy.mjs"
      - "scripts/direct-db-mutation-baseline.json"

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture test output
        shell: bash
        run: |
          set +e
          npm run test:direct-db-mutation > direct-db-test.log 2>&1
          STATUS=$?
          cat direct-db-test.log
          echo "$STATUS" > direct-db-test.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: a5-5-2-direct-db-diagnostic
          path: |
            direct-db-test.log
            direct-db-test.status
          if-no-files-found: error
