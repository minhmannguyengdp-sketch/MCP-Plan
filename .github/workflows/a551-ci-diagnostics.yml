name: A5.5.1 CI Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnostics:
    if: github.head_ref == 'a5-5-1-idempotency-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a5-5-1-idempotency-core
      - name: Apply backend regression updates
        run: node scripts/a551-update-backend-tests.mjs
      - name: Commit backend regression updates
        run: |
          if git diff --quiet; then
            echo "backend_test_changes_already_applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/backend/foundation/*.test.js
          git commit -m "Update A5.5.1 backend idempotency contracts"
          git push origin HEAD:a5-5-1-idempotency-core
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture regression outputs
        run: |
          mkdir -p diagnostics
          set +e
          npm run test:direct-db-mutation > diagnostics/scanner-tests.txt 2>&1
          echo $? > diagnostics/scanner-tests.exit
          npm --prefix apps/backend test > diagnostics/backend-tests.txt 2>&1
          echo $? > diagnostics/backend-tests.exit
          npm run typecheck > diagnostics/typecheck.txt 2>&1
          echo $? > diagnostics/typecheck.exit
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: a551-ci-diagnostics
          path: diagnostics
          if-no-files-found: error
