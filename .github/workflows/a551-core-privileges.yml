name: A5.5.1 Core Privileges

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'a5-5-1-idempotency-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a5-5-1-idempotency-core
      - run: node scripts/a551-tighten-core-revokes.mjs
      - name: Commit precise revokes
        run: |
          if git diff --quiet; then
            echo "privileges_already_precise"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/20260717090000_idempotency_audit_core.sql
          git commit -m "Use precise privileges for A5.5.1 core"
          git push origin HEAD:a5-5-1-idempotency-core
