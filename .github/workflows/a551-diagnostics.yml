name: A5.5.1 Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnostics:
    if: github.head_ref == 'a5-5-1-idempotency-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a5-5-1-idempotency-core
      - name: Apply verified source transforms
        run: |
          node scripts/a551-apply-caller-idempotency.mjs
          node scripts/a551-update-mutation-baseline.mjs
      - name: Commit verified source transforms
        run: |
          if git diff --quiet; then
            echo "source_transforms_already_applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/api/api-client.ts \
            src/features/mcp/McpSessionsManagerSafe.tsx \
            src/lib/api/backend-proxy.ts \
            src/app/api/mcp-session-report/analyze/route.ts \
            src/features/market-reports/MarketReportsClientPage.tsx \
            scripts/direct-db-mutation-baseline.json
          git commit -m "Register A5.5.1 idempotent mutation boundaries"
          git push origin HEAD:a5-5-1-idempotency-core
      - name: Build caller and scanner diagnostics
        run: |
          mkdir -p diagnostics
          git ls-files > diagnostics/repository-files.txt
          grep -RInE '/api/(mcp-day/session-customer/(result|add)|mcp-session-report|field-checks/result|mcp-report-setting-groups|mcp-report-settings)' src apps test docs > diagnostics/foundation-route-callers.txt || true
          node scripts/audit-direct-db-mutation-policy.mjs > diagnostics/scanner-output.txt 2>&1 || true
          cp direct-db-mutation-findings.json diagnostics/ 2>/dev/null || true
          cp direct-db-mutation-findings.txt diagnostics/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: a551-diagnostics
          path: diagnostics
          if-no-files-found: error
