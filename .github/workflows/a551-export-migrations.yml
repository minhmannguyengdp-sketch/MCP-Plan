name: A5.5.1 Export Migrations

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  export:
    if: github.head_ref == 'a5-5-1-idempotency-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a5-5-1-idempotency-core
      - name: Qualify pgcrypto functions
        run: node scripts/a551-qualify-pgcrypto.mjs
      - name: Commit source correction
        run: |
          if git diff --quiet; then
            echo "pgcrypto_already_qualified"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add supabase/migrations/20260717090000_idempotency_audit_core.sql apps/backend/foundation/idempotency-migration.test.js
            git commit -m "Qualify pgcrypto functions in A5.5.1 core"
            git push origin HEAD:a5-5-1-idempotency-core
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: a551-production-migrations
          path: |
            supabase/migrations/20260717090000_idempotency_audit_core.sql
            supabase/migrations/20260717091000_foundation_idempotent_mutations.sql
          if-no-files-found: error
