name: A5.5.1 Field Check Guard

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'a5-5-1-idempotency-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a5-5-1-idempotency-core
      - run: node scripts/a551-restore-field-check-guard.mjs
      - name: Commit guard restoration
        run: |
          if git diff --quiet; then
            echo "guard_already_restored"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/market-checks/MarketChecksClientPage.tsx
          git commit -m "Restore field-check missing-result guard"
          git push origin HEAD:a5-5-1-idempotency-core
