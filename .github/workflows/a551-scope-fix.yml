name: A5.5.1 Scope Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'a5-5-1-idempotency-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a5-5-1-idempotency-core
      - run: node scripts/a551-fix-onboarding-scope.mjs
      - name: Commit scope correction
        run: |
          if git diff --quiet; then
            echo "scope_already_correct"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/api/api-client.ts src/features/mcp/McpSessionsManagerSafe.tsx
          git commit -m "Limit A5.5.1 retries to onboarded mutation routes"
          git push origin HEAD:a5-5-1-idempotency-core
