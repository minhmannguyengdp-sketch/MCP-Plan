name: Apply MCP session VPS fix

on:
  push:
    branches:
      - main
    paths:
      - scripts/apply-mcp-session-vps-fix.mjs
      - .github/workflows/apply-mcp-session-vps-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply backend patch
        run: node scripts/apply-mcp-session-vps-fix.mjs

      - name: Verify backend syntax
        run: node --check apps/backend/server.js

      - name: Commit backend fix and remove one-time files
        run: |
          rm scripts/apply-mcp-session-vps-fix.mjs
          rm .github/workflows/apply-mcp-session-vps-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Route MCP session mutations through VPS backend"
          git push origin main
