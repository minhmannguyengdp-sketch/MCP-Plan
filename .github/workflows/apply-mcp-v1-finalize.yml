name: Apply MCP v1 finalization

on:
  push:
    branches:
      - fix/mcp-v1-finalize-20260711
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mcp-v1-finalize-20260711
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply MCP v1 patch
        run: node scripts/apply-mcp-v1-finalize.mjs

      - name: Check backend syntax
        run: node --check apps/backend/server.js

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Commit finalized sources
        run: |
          rm scripts/apply-mcp-v1-finalize.mjs
          rm .github/workflows/apply-mcp-v1-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize MCP v1 contracts and VPS mutations"
          git push origin fix/mcp-v1-finalize-20260711
