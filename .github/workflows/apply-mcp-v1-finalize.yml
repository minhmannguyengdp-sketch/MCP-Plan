name: Apply MCP v1 finalization

on:
  push:
    branches:
      - fix/mcp-v1-finalize-20260711
  pull_request:
    branches:
      - main

concurrency:
  group: mcp-v1-finalize
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BACKEND_API_BASE_URL: http://165.22.109.61
      NEXT_PUBLIC_API_BASE_URL: http://165.22.109.61
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mcp-v1-finalize-20260711
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply MCP v1 patch
        run: node scripts/apply-mcp-v1-finalize.mjs

      - name: Check backend syntax
        run: node --check apps/backend/server.js

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: |
          set -o pipefail
          npm run build 2>&1 | tee mcp-v1-build.log

      - name: Save failure log
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mcp-v1-build.log
          git commit -m "Record MCP v1 build failure" || true
          git push origin fix/mcp-v1-finalize-20260711

      - name: Commit finalized sources
        if: success()
        run: |
          rm scripts/apply-mcp-v1-finalize.mjs
          rm .github/workflows/apply-mcp-v1-finalize.yml
          rm -f mcp-v1-build.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize MCP v1 contracts and VPS mutations"
          git push origin fix/mcp-v1-finalize-20260711
