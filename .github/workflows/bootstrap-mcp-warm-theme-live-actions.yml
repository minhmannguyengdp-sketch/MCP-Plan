name: Bootstrap MCP warm theme and action smoke

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-mcp-warm-theme-live-actions.yml"

permissions:
  contents: write

jobs:
  apply-slice:
    if: github.event.pull_request.head.ref == 'ui/mcp-warm-theme-live-actions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/mcp-warm-theme-live-actions
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply caller fix, browser smoke and warm theme tokens
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'marker_not_found:{path}:{old[:80]}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          source = 'src/features/mcp/McpSessionCompactViewFinal2.tsx'
          replace_once(source,
          '''function mutationOperation(path: string) {
            if (path === "/api/mcp-day/session-customer/order") return "session-customer.order.create";
            if (path === "/api/mcp-day/session-customer/test") return "session-customer.test.create";
            if (path === "/api/mcp-day/session-customer/report") return "session-customer.report.create";
            if (path === "/api/mcp-day/session-customer/followup") return "session-customer.followup.create";
            if (path === "/api/backend/mcp-day/session-customer/status") return "session-customer.status.update";
            throw new Error(`unsupported_mutation_operation:${path}`);
          }''',
          '''function mutationOperation(path: string) {
            if (path === "/api/backend/mcp-day/session-customer/order") return "session-customer.order.create";
            if (path === "/api/backend/mcp-day/session-customer/test") return "session-customer.test.create";
            if (path === "/api/backend/mcp-day/session-customer/report") return "session-customer.report.create";
            if (path === "/api/backend/mcp-day/session-customer/followup") return "session-customer.followup.create";
            if (path === "/api/backend/mcp-day/session-customer/status") return "session-customer.status.update";
            throw new Error(`unsupported_mutation_operation:${path}`);
          }''')
          replace_once(source,
          '''    const err = payload as { error?: string; detail?: string };
              throw new Error(err.error || err.detail || "Không lưu được hành động MCP");''',
          '''    const err = payload as { error?: string | { message?: string }; detail?: string };
              const errorMessage = typeof err.error === "string" ? err.error : err.error?.message;
              throw new Error(errorMessage || err.detail || "Không lưu được hành động MCP");''')
          replace_once(source,
          '''await postJson("/api/mcp-orders/from-session-customer", { sessionCustomerId, items:''',
          '''await postJson("/api/backend/mcp-day/session-customer/order", { sessionCustomerId, items:''')

          layout = Path('src/app/layout.tsx')
          layout_text = layout.read_text(encoding='utf-8')
          import_marker = 'import "./export-menu-fix.css";\n'
          if 'import "./npp-theme.css";' not in layout_text:
              if import_marker not in layout_text:
                  raise SystemExit('layout_import_marker_not_found')
              layout_text = layout_text.replace(import_marker, import_marker + 'import "./npp-theme.css";\n', 1)
          layout_text = layout_text.replace('themeColor: "#101828"', 'themeColor: "#5A3A24"')
          layout.write_text(layout_text, encoding='utf-8')

          Path('src/app/npp-theme.css').write_text(r''':root {
            color-scheme: light;
            --npp-color-canvas: #f7f3ed;
            --npp-color-surface: #ffffff;
            --npp-color-surface-soft: #fbf8f4;
            --npp-color-header: #5a3a24;
            --npp-color-header-strong: #4b2f1f;
            --npp-color-primary: #4f7a3a;
            --npp-color-primary-strong: #42662f;
            --npp-color-primary-soft: #edf4e8;
            --npp-color-accent: #c89b5b;
            --npp-color-text: #2b211b;
            --npp-color-text-muted: #6f685f;
            --npp-color-border: #e8ded2;
            --npp-color-danger: #b42318;
            --npp-color-warning: #9a5b13;
            --npp-color-success: #3f6f32;
            --npp-color-on-header: #ffffff;
            --npp-shadow-card: 0 1px 2px rgba(75, 47, 31, 0.05), 0 14px 34px rgba(75, 47, 31, 0.07);

            /* Compatibility aliases: existing screens consume one token source. */
            --bg: var(--npp-color-canvas);
            --panel: var(--npp-color-surface);
            --panel-soft: var(--npp-color-surface-soft);
            --text: var(--npp-color-text);
            --muted: var(--npp-color-text-muted);
            --line: var(--npp-color-border);
            --brand: var(--npp-color-primary);
            --brand-strong: var(--npp-color-primary-strong);
            --brand-soft: var(--npp-color-primary-soft);
            --accent: var(--npp-color-accent);
            --success: var(--npp-color-success);
            --warning: var(--npp-color-warning);
            --danger: var(--npp-color-danger);
            --shadow: var(--npp-shadow-card);
          }

          body {
            background: var(--npp-color-canvas);
          }

          .sidebar {
            background: linear-gradient(180deg, var(--npp-color-header-strong), var(--npp-color-header));
            color: var(--npp-color-on-header);
          }

          .sidebar-subtitle,
          .sidebar-footer {
            color: rgba(255, 255, 255, 0.68);
          }

          .sidebar-link {
            color: rgba(255, 255, 255, 0.82);
          }

          .sidebar-link.active,
          .sidebar-link:hover {
            background: var(--npp-color-primary);
            color: var(--npp-color-on-header);
          }

          .card,
          .filter-bar,
          .bottom-sheet {
            box-shadow: var(--npp-shadow-card);
          }

          .button.primary {
            background: var(--npp-color-primary);
            border-color: var(--npp-color-primary);
          }

          .button.primary:hover:not(:disabled) {
            background: var(--npp-color-primary-strong);
            border-color: var(--npp-color-primary-strong);
          }

          ::selection {
            background: var(--npp-color-primary-soft);
            color: var(--npp-color-text);
          }
          ''', encoding='utf-8')

          Path('test/a5-5-2-session-action-live-caller-contract.test.mjs').write_text(r'''import test from "node:test";
          import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";

          const source = await readFile("src/features/mcp/McpSessionCompactViewFinal2.tsx", "utf8");

          const routes = [
            ["order", "session-customer.order.create"],
            ["test", "session-customer.test.create"],
            ["report", "session-customer.report.create"],
            ["followup", "session-customer.followup.create"]
          ];

          test("the four UI actions call the same canonical frontend proxy paths accepted by mutationOperation", () => {
            for (const [route, operation] of routes) {
              const path = `/api/backend/mcp-day/session-customer/${route}`;
              assert.match(source, new RegExp(`if \\(path === "${path.replaceAll("/", "\\/")} "`.replace(" } ", "")));
              assert.match(source, new RegExp(`postJson\\("${path.replaceAll("/", "\\/")}"`));
              assert.match(source, new RegExp(operation.replaceAll(".", "\\.")));
            }
            assert.doesNotMatch(source, /postJson\("\/api\/mcp-orders\/from-session-customer"/);
          });

          test("canonical provider errors are mapped to a user-facing message", () => {
            assert.match(source, /typeof err\.error === "string" \? err\.error : err\.error\?\.message/);
          });
          ''', encoding='utf-8')

          Path('test/mcp-warm-theme-contract.test.mjs').write_text(r'''import test from "node:test";
          import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";

          const css = await readFile("src/app/npp-theme.css", "utf8");
          const layout = await readFile("src/app/layout.tsx", "utf8");

          const tokens = {
            "--npp-color-canvas": "#f7f3ed",
            "--npp-color-surface": "#ffffff",
            "--npp-color-header": "#5a3a24",
            "--npp-color-primary": "#4f7a3a",
            "--npp-color-accent": "#c89b5b",
            "--npp-color-text": "#2b211b",
            "--npp-color-border": "#e8ded2"
          };

          test("warm MCP palette is owned by one semantic token layer", () => {
            for (const [name, value] of Object.entries(tokens)) {
              assert.match(css, new RegExp(`${name}:\\s*${value}`, "i"));
            }
            for (const alias of ["--bg", "--panel", "--panel-soft", "--text", "--muted", "--line", "--brand", "--brand-strong", "--brand-soft", "--accent"]) {
              assert.match(css, new RegExp(`${alias}:\\s*var\\(--npp-`));
            }
          });

          test("theme is imported last and browser chrome uses the brown header token", () => {
            const themeIndex = layout.indexOf('import "./npp-theme.css";');
            const previousIndex = layout.indexOf('import "./export-menu-fix.css";');
            assert.ok(themeIndex > previousIndex, "theme override must load after legacy screen CSS");
            assert.match(layout, /themeColor:\s*"#5A3A24"/);
          });
          ''', encoding='utf-8')

          Path('test/ui/mcp-session-actions-mock-backend.mjs').write_text(r'''import http from "node:http";
          import { mkdir, writeFile } from "node:fs/promises";

          const port = Number(process.env.MCP_ACTION_UI_MOCK_PORT || 3110);
          const resultsDir = process.env.MCP_ACTION_UI_RESULTS_DIR || "test-results/mcp-session-actions";
          const product = { productId: "product-ui", variantId: "variant-ui", name: "Trà UI Smoke", brand: "NPP", category: "Trà", sku: "UI-001", variantName: "Chai", sizeLabel: "350ml", sellUnit: "chai", packUnit: "thùng", packQuantity: 24, price: 12000 };

          function initialState() {
            return {
              requests: [],
              aggregates: { orders: [], tests: [], reports: [], followups: [] },
              line: { id: "sc-existing", sessionCustomerId: "sc-existing", routeCustomerId: "rc-existing", sortOrder: 1, accountName: "UI Existing Customer", area: "API Smoke", source: "planned", status: "pending", note: "Browser smoke seed", hasOrder: false, hasTest: false, hasReport: false, followupCount: 0, checkedIn: false }
            };
          }

          let state = initialState();
          const json = (res, status, payload) => { res.writeHead(status, { "Content-Type": "application/json; charset=utf-8", "Cache-Control": "no-store" }); res.end(JSON.stringify(payload)); };
          const canonical = (req, data) => ({ data, requestId: String(req.headers["x-request-id"] || "ui-request"), receivedAt: new Date().toISOString() });
          async function body(req) { const chunks = []; for await (const chunk of req) chunks.push(chunk); const text = Buffer.concat(chunks).toString("utf8"); return text ? JSON.parse(text) : {}; }
          function record(req, url, payload) { const item = { method: req.method, path: url.pathname, idempotencyKey: String(req.headers["idempotency-key"] || ""), requestId: String(req.headers["x-request-id"] || ""), payload }; state.requests.push(item); return item; }
          async function persist() { await mkdir(resultsDir, { recursive: true }); await writeFile(`${resultsDir}/mock-state.json`, JSON.stringify(state, null, 2)); }

          const routes = [{ id: "route-active", name: "UI Smoke Active", area: "API Smoke", salesOwner: "Sales UI", plannedCustomers: 1, visitedCustomers: 0, orderCount: 0, lastVisitDate: "-", status: "active" }];
          const routeCustomers = [{ id: "rc-existing", routeId: "route-active", routeName: "UI Smoke Active", accountId: "customer-existing", accountName: "UI Existing Customer", contactName: "0900000000", area: "API Smoke", sortOrder: 1, status: "active", note: "Browser smoke seed" }];
          function dayData() { return { sessionOpened: true, run: { id: "session-active", routeId: "route-active", routeName: "UI Smoke Active", date: "2099-12-30", owner: "Sales UI", status: "active", openedAt: "08:00" }, kpis: [], lines: [state.line], results: [] }; }

          const server = http.createServer(async (req, res) => {
            const url = new URL(req.url || "/", `http://${req.headers.host || `127.0.0.1:${port}`}`);
            try {
              if (req.method === "GET" && url.pathname === "/health") return json(res, 200, { ok: true });
              if (req.method === "POST" && url.pathname === "/__reset") { state = initialState(); await persist(); return json(res, 200, { ok: true }); }
              if (req.method === "GET" && url.pathname === "/__state") return json(res, 200, state);
              if (req.method === "GET" && url.pathname === "/api/routes/data") return json(res, 200, canonical(req, { kpis: [], routes }));
              if (req.method === "GET" && url.pathname === "/api/routes/customers/data") return json(res, 200, canonical(req, { kpis: [], customers: routeCustomers }));
              if (req.method === "GET" && url.pathname === "/api/mcp-day/data") return json(res, 200, canonical(req, dayData()));
              if (req.method === "GET" && url.pathname === "/api/mcp-settings/session-status") return json(res, 200, canonical(req, { sessions: [{ id: "session-active", routeId: "route-active", routeName: "UI Smoke Active", sessionDate: "2099-12-30", status: "active" }] }));
              if (req.method === "GET" && url.pathname === "/api/products/search") return json(res, 200, { data: [product] });
              if (req.method === "GET" && url.pathname === "/api/products/product-ui/variants") return json(res, 200, { data: [product] });
              if (req.method === "GET" && url.pathname === "/api/mcp-report-settings") return json(res, 200, { data: { groups: [] } });

              const action = req.method === "POST" && url.pathname.match(/^\/api\/mcp-day\/session-customer\/(order|test|report|followup)$/);
              if (action) {
                const payload = await body(req);
                const entry = record(req, url, payload);
                if (!entry.idempotencyKey) return json(res, 400, { error: { code: "idempotency_key_required", message: "idempotency_key_required" } });
                const kind = action[1];
                const id = `${kind}-ui-${state.aggregates[kind === "followup" ? "followups" : `${kind}s`].length + 1}`;
                const bucket = kind === "followup" ? "followups" : `${kind}s`;
                state.aggregates[bucket].push({ id, ...payload });
                if (kind === "order") state.line.hasOrder = true;
                if (kind === "test") state.line.hasTest = true;
                if (kind === "report") state.line.hasReport = true;
                if (kind === "followup") state.line.followupCount += 1;
                await persist();
                return json(res, 200, canonical(req, { id, sessionCustomerId: payload.sessionCustomerId }));
              }

              return json(res, 404, { error: { code: "not_found", message: `${req.method} ${url.pathname}` } });
            } catch (error) {
              return json(res, 500, { error: { code: "mock_error", message: error instanceof Error ? error.message : String(error) } });
            }
          });

          server.listen(port, "127.0.0.1", async () => { await persist(); console.log(`MCP action UI mock listening on 127.0.0.1:${port}`); });
          ''', encoding='utf-8')

          Path('test/ui/mcp-session-actions-browser-smoke.mjs').write_text(r'''import assert from "node:assert/strict";
          import { mkdir, writeFile } from "node:fs/promises";
          import { chromium } from "playwright";

          const appBase = process.env.MCP_ACTION_UI_APP_BASE || "http://127.0.0.1:3011";
          const mockBase = process.env.MCP_ACTION_UI_MOCK_BASE || "http://127.0.0.1:3110";
          const resultsDir = process.env.MCP_ACTION_UI_RESULTS_DIR || "test-results/mcp-session-actions";
          await mkdir(resultsDir, { recursive: true });

          async function waitForHttp(url, timeoutMs = 120000) { const start = Date.now(); let error; while (Date.now() - start < timeoutMs) { try { const response = await fetch(url, { cache: "no-store" }); if (response.ok) return; error = new Error(`${url}:${response.status}`); } catch (next) { error = next; } await new Promise((resolve) => setTimeout(resolve, 500)); } throw error || new Error(`timeout:${url}`); }
          async function reset() { const response = await fetch(`${mockBase}/__reset`, { method: "POST" }); assert.equal(response.status, 200); }
          async function state() { const response = await fetch(`${mockBase}/__state`, { cache: "no-store" }); assert.equal(response.status, 200); return response.json(); }
          function card(page) { return page.locator("article").filter({ hasText: "UI Existing Customer" }).first(); }
          async function saveAndWait(page, dialogName, saveName) { const dialog = page.getByRole("dialog", { name: dialogName, exact: true }); await dialog.getByRole("button", { name: saveName, exact: true }).click(); await dialog.waitFor({ state: "hidden" }); }
          async function shot(page, name) { await page.screenshot({ path: `${resultsDir}/${name}.png`, fullPage: true }); }

          await waitForHttp(`${mockBase}/health`);
          await waitForHttp(`${appBase}/visits?routeId=route-active&date=2099-12-30`);
          await reset();

          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({ viewport: { width: 390, height: 844 } });
          const page = await context.newPage();
          const result = { MCP_SESSION_ACTION_UI_SMOKE: "FAIL" };

          try {
            await page.goto(`${appBase}/visits?routeId=route-active&date=2099-12-30`, { waitUntil: "networkidle" });
            const tokens = await page.evaluate(() => { const style = getComputedStyle(document.documentElement); return { canvas: style.getPropertyValue("--npp-color-canvas").trim(), surface: style.getPropertyValue("--npp-color-surface").trim(), header: style.getPropertyValue("--npp-color-header").trim(), primary: style.getPropertyValue("--npp-color-primary").trim(), accent: style.getPropertyValue("--npp-color-accent").trim() }; });
            assert.deepEqual(tokens, { canvas: "#f7f3ed", surface: "#ffffff", header: "#5a3a24", primary: "#4f7a3a", accent: "#c89b5b" });
            await shot(page, "01-warm-theme-session");

            await card(page).getByRole("button", { name: "Đơn", exact: true }).click();
            const order = page.getByRole("dialog", { name: "Tạo đơn hàng", exact: true });
            await order.getByRole("button", { name: "+ Chọn sản phẩm", exact: true }).click();
            const picker = page.getByRole("dialog", { name: "Chọn sản phẩm", exact: true });
            await picker.getByRole("button", { name: /Trà UI Smoke/ }).first().click();
            await picker.getByRole("button", { name: "Thêm 1 mã vào đơn", exact: true }).click();
            await saveAndWait(page, "Tạo đơn hàng", "Lưu đơn hàng");

            await card(page).getByRole("button", { name: "Test", exact: true }).click();
            const testDialog = page.getByRole("dialog", { name: "Ghi kết quả thử sản phẩm", exact: true });
            await testDialog.getByPlaceholder("Nhập tên sản phẩm").fill("Trà UI Smoke");
            await testDialog.getByRole("button", { name: "Đạt", exact: true }).click();
            await saveAndWait(page, "Ghi kết quả thử sản phẩm", "Lưu kết quả thử");

            await card(page).getByRole("button", { name: "Quan sát", exact: true }).click();
            const reportDialog = page.getByRole("dialog", { name: "Ghi quan sát thị trường", exact: true });
            await reportDialog.getByRole("button", { name: "Cần báo giá", exact: true }).click();
            await saveAndWait(page, "Ghi quan sát thị trường", "Lưu quan sát");

            await card(page).getByRole("button", { name: "Theo dõi", exact: true }).click();
            const followupDialog = page.getByRole("dialog", { name: "Tạo việc cần theo dõi", exact: true });
            await followupDialog.getByRole("button", { name: "Gửi báo giá", exact: true }).click();
            await followupDialog.getByRole("button", { name: "Mai", exact: true }).click();
            await saveAndWait(page, "Tạo việc cần theo dõi", "Lưu việc theo dõi");
            await shot(page, "02-four-actions-pass");

            const mock = await state();
            const expected = ["order", "test", "report", "followup"];
            for (const route of expected) {
              const request = mock.requests.find((item) => item.path === `/api/mcp-day/session-customer/${route}`);
              assert.ok(request, `missing ${route} request`);
              assert.ok(request.idempotencyKey, `${route} request must carry Idempotency-Key`);
              assert.equal(request.payload.sessionCustomerId, "sc-existing");
            }
            assert.equal(mock.aggregates.orders.length, 1);
            assert.equal(mock.aggregates.tests.length, 1);
            assert.equal(mock.aggregates.reports.length, 1);
            assert.equal(mock.aggregates.followups.length, 1);
            result.MCP_SESSION_ACTION_UI_SMOKE = "PASS";
            result.actions = expected;
            result.idempotencyKeys = "PASS";
            result.themeTokens = tokens;
          } catch (error) {
            result.error = error instanceof Error ? `${error.name}: ${error.message}\n${error.stack || ""}` : String(error);
            await shot(page, "failure").catch(() => {});
            await writeFile(`${resultsDir}/failure.html`, await page.content()).catch(() => {});
            throw error;
          } finally {
            await writeFile(`${resultsDir}/result.json`, JSON.stringify(result, null, 2));
            console.log(JSON.stringify(result, null, 2));
            await context.close();
            await browser.close();
          }
          ''', encoding='utf-8')

          Path('.github/workflows/mcp-session-actions-browser-smoke.yml').write_text(r'''name: MCP Session Actions Browser Smoke

          on:
            pull_request:
              paths:
                - ".github/workflows/mcp-session-actions-browser-smoke.yml"
                - "src/app/layout.tsx"
                - "src/app/npp-theme.css"
                - "src/features/mcp/McpSessionCompactViewFinal2.tsx"
                - "src/lib/api/**"
                - "test/ui/mcp-session-actions-**"
                - "test/a5-5-2-session-action-live-caller-contract.test.mjs"
                - "test/mcp-warm-theme-contract.test.mjs"
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            browser-smoke:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 20
                    cache: npm
                - run: npm ci
                - name: Install Playwright Chromium
                  run: |
                    npm install --no-save --package-lock=false playwright@1.54.1
                    npx playwright install --with-deps chromium
                - name: Build Next production app
                  env:
                    BACKEND_API_BASE_URL: http://127.0.0.1:3110
                    BACKEND_API_TOKEN: 0123456789abcdef0123456789abcdef
                    MCP_LEGACY_ACTOR_ID: service:ci:mcp-v1
                    SUPABASE_URL: https://project.example.com
                    SUPABASE_ANON_KEY: ci-publishable-key
                  run: npm run build
                - name: Click four session actions and verify warm tokens
                  env:
                    BACKEND_API_BASE_URL: http://127.0.0.1:3110
                    BACKEND_API_TOKEN: 0123456789abcdef0123456789abcdef
                    MCP_LEGACY_ACTOR_ID: service:ci:mcp-v1
                    SUPABASE_URL: https://project.example.com
                    SUPABASE_ANON_KEY: ci-publishable-key
                    MCP_ACTION_UI_RESULTS_DIR: test-results/mcp-session-actions
                  run: |
                    set -euo pipefail
                    mkdir -p test-results/mcp-session-actions
                    node test/ui/mcp-session-actions-mock-backend.mjs >test-results/mcp-session-actions/mock.log 2>&1 &
                    MOCK_PID=$!
                    npm start -- -p 3011 >test-results/mcp-session-actions/next.log 2>&1 &
                    APP_PID=$!
                    trap 'kill "$APP_PID" "$MOCK_PID" 2>/dev/null || true' EXIT
                    node test/ui/mcp-session-actions-browser-smoke.mjs | tee test-results/mcp-session-actions/browser.log
                - name: Upload evidence
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: mcp-session-actions-browser-evidence
                    path: test-results/mcp-session-actions
                    if-no-files-found: error
          ''', encoding='utf-8')

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
