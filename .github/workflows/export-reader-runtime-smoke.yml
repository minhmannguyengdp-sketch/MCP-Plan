name: Export Reader Runtime Smoke

on:
  pull_request:
    paths:
      - ".github/workflows/export-reader-runtime-smoke.yml"
      - "src/app/api/exports/**"
      - "src/app/api/pdf/**"
      - "src/app/api/mcp-session-report/**"
      - "src/features/exports/**"
      - "src/lib/export/**"
      - "src/lib/mcp/session-report**"
      - "test/export-reader-copy-contract.test.mjs"
      - "test/ui/export-reader-**"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-reader-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          BACKEND_API_BASE_URL: http://127.0.0.1:3111
          BACKEND_API_TOKEN: 0123456789abcdef0123456789abcdef
          MCP_LEGACY_ACTOR_ID: service:ci:export-reader
          SUPABASE_URL: http://127.0.0.1:3112
          SUPABASE_ANON_KEY: ci-publishable-key
        run: npm run build

      - name: Exercise report and CSV exports
        env:
          BACKEND_API_BASE_URL: http://127.0.0.1:3111
          BACKEND_API_TOKEN: 0123456789abcdef0123456789abcdef
          MCP_LEGACY_ACTOR_ID: service:ci:export-reader
          SUPABASE_URL: http://127.0.0.1:3112
          SUPABASE_ANON_KEY: ci-publishable-key
          EXPORT_MOCK_PORT: 3112
          EXPORT_MOCK_BASE: http://127.0.0.1:3112
          EXPORT_APP_BASE: http://127.0.0.1:3004
          EXPORT_RESULTS_DIR: test-results/export-reader-smoke
        run: |
          set -euo pipefail
          mkdir -p test-results/export-reader-smoke
          node test/ui/export-reader-mock-supabase.mjs >test-results/export-reader-smoke/mock-supabase.log 2>&1 &
          MOCK_PID=$!
          npm start -- -p 3004 >test-results/export-reader-smoke/next.log 2>&1 &
          APP_PID=$!
          cleanup() {
            kill "$APP_PID" "$MOCK_PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          node test/ui/export-reader-runtime-smoke.mjs 2>&1 | tee test-results/export-reader-smoke/runtime-smoke.log

      - name: Upload export evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: export-reader-runtime-evidence
          path: test-results/export-reader-smoke
          if-no-files-found: error
