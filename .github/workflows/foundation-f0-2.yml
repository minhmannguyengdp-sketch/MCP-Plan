name: Foundation F0.2

on:
  pull_request:
  push:
    branches:
      - main
      - f0-2-installation-context-config

permissions:
  contents: read

jobs:
  verify-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime hardcodes
        run: npm run audit:runtime-config

      - name: Verify backend foundation
        run: npm --prefix apps/backend run verify

      - name: Typecheck
        run: npm run typecheck
