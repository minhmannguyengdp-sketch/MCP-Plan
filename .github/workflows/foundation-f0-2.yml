name: Foundation F0.2

on:
  pull_request:
  push:
    branches:
      - main
      - f0-2-installation-context-config

permissions:
  contents: read

jobs:
  verify-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime hardcodes
        run: npm run audit:runtime-config

      - name: Upload hardcode audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-hardcode-findings
          path: runtime-hardcode-findings.txt
          if-no-files-found: error

      - name: Test direct mutation scanner and retirement policy
        run: npm run test:direct-db-mutation

      - name: Verify Edge mutation retirement
        run: npm run test:edge-retirement

      - name: Verify direct REST mutation retirement
        run: npm run test:direct-rest-retirement

      - name: Verify session lifecycle caller contract
        run: npm run test:session-lifecycle-caller

      - name: Verify A5.5.1 idempotency caller contract
        run: node --test test/a5-5-1-idempotency-caller-contract.test.mjs

      - name: Verify A5.5.2 session action contracts
        run: node --test test/a5-5-2-session-action-caller-contract.test.mjs test/a5-5-2-session-action-runtime-smoke-contract.test.mjs

      - name: Verify order and active-route idempotency contracts
        run: node --test test/orders-create-ui-contract.test.mjs test/route-active-session-ui-contract.test.mjs

      - name: Verify check-in and F05 runtime contracts
        run: node --test test/mcp-session-checkin-ui-contract.test.mjs test/f05-runtime-smoke-script.test.mjs

      - name: Verify production hygiene contracts
        run: npm run test:production-hygiene

      - name: Audit direct DB mutations
        run: npm run audit:direct-db-mutation

      - name: Upload direct mutation audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direct-db-mutation-findings
          path: |
            direct-db-mutation-findings.txt
            direct-db-mutation-findings.json
          if-no-files-found: error

      - name: Verify deploy and frontend gateway auth contracts
        run: |
          bash -n ops/pullmcp
          npm run test:pullmcp-deployer
          npm run test:backend-api-auth

      - name: Verify backend foundation
        run: npm --prefix apps/backend run verify

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend with validated runtime config
        env:
          BACKEND_API_BASE_URL: http://127.0.0.1:3001
          BACKEND_API_TOKEN: 0123456789abcdef0123456789abcdef
          MCP_LEGACY_ACTOR_ID: service:ci:mcp-v1
          SUPABASE_URL: https://project.example.com
          SUPABASE_ANON_KEY: ci-publishable-key
        run: npm run build
