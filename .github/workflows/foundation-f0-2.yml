name: Foundation F0.2

on:
  pull_request:
  push:
    branches:
      - main
      - f0-2-installation-context-config

permissions:
  contents: write

jobs:
  verify-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Apply canonical error parser migration
        if: github.event_name == 'pull_request' && github.head_ref == 'ui/browser-shell-acceptance'
        run: |
          set -euo pipefail
          node scripts/fix-mcp-canonical-error-parser.mjs
          if git diff --quiet -- src/features/mcp/McpSessionCompactViewFinal2.tsx; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/mcp/McpSessionCompactViewFinal2.tsx
          git commit -m "fix(ui): parse canonical API error messages"
          git push origin HEAD:${GITHUB_HEAD_REF}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime hardcodes
        run: npm run audit:runtime-config

      - name: Upload hardcode audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-hardcode-findings
          path: runtime-hardcode-findings.txt
          if-no-files-found: error

      - name: Test direct mutation scanner and retirement policy
        run: |
          npm run test:direct-db-mutation
          npm run test:edge-retirement
          npm run test:direct-rest-retirement
          npm run test:idempotency

      - name: Verify production hygiene contracts
        run: npm run test:production-hygiene

      - name: Audit direct DB mutations
        run: npm run audit:direct-db-mutation

      - name: Upload direct mutation audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direct-db-mutation-findings
          path: |
            direct-db-mutation-findings.txt
            direct-db-mutation-findings.json
          if-no-files-found: error

      - name: Verify deploy and frontend gateway auth contracts
        run: |
          bash -n ops/pullmcp
          npm run test:pullmcp-deployer
          npm run test:backend-api-auth

      - name: Verify backend foundation
        run: npm --prefix apps/backend run verify

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend with validated runtime config
        env:
          BACKEND_API_BASE_URL: http://127.0.0.1:3001
          BACKEND_API_TOKEN: 0123456789abcdef0123456789abcdef
          MCP_LEGACY_ACTOR_ID: service:ci:mcp-v1
          SUPABASE_URL: https://project.example.com
          SUPABASE_ANON_KEY: ci-publishable-key
        run: npm run build
