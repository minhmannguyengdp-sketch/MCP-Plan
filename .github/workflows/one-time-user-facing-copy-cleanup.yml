name: One-time user-facing copy cleanup

on:
  push:
    branches:
      - chore/user-facing-language-audit-20260713

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chore/user-facing-language-audit-20260713
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply copy cleanup
        run: node scripts/apply-user-facing-copy-cleanup.mjs

      - name: Audit user-facing copy
        run: npm run audit:copy

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          BACKEND_API_BASE_URL: http://165.22.109.61
          NEXT_PUBLIC_API_BASE_URL: http://165.22.109.61
        run: npm run build

      - name: Commit verified cleanup
        run: |
          rm -f scripts/apply-user-facing-copy-cleanup.mjs
          rm -f .github/workflows/one-time-user-facing-copy-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace demo and developer copy with business language"
          git push origin HEAD:chore/user-facing-language-audit-20260713
