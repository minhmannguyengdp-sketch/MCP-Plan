name: Temporary Phase 8B3 Result Patch
on:
  push:
    branches: [main]
    paths: [.github/workflows/patch-phase-8b3-compact.yml]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch result endpoint
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'apps/backend/server.js';
          let content = fs.readFileSync(path, 'utf8');

          const helper = `
async function updateMcpSessionCustomerResult(body) {
  const sessionCustomerId = String(body.sessionCustomerId || body.session_customer_id || body.id || "").trim();
  const resultType = String(body.resultType || body.result_type || body.type || "").trim().toLowerCase();
  const note = String(body.note || body.result || body.resultNote || body.result_note || "").trim();
  const orderId = String(body.orderId || body.order_id || "").trim();
  const now = new Date().toISOString();

  if (!sessionCustomerId) throw badRequest("session_customer_id_required");
  if (resultType && !["order", "test", "report"].includes(resultType)) throw badRequest("invalid_result_type");
  if (!resultType && !note && !orderId && body.hasOrder === undefined && body.has_order === undefined && body.hasTest === undefined && body.has_test === undefined && body.hasReport === undefined && body.has_report === undefined) {
    throw badRequest("result_required");
  }

  const toBool = (value, fallback = false) => {
    if (value === undefined || value === null || value === "") return fallback;
    if (typeof value === "boolean") return value;
    if (typeof value === "number") return value !== 0;
    return ["true", "1", "yes", "y", "co", "có"].includes(String(value).trim().toLowerCase());
  };

  const rows = await supabaseGet("mcp_session_customers", {
    select: "id,session_id,route_id,route_customer_id,customer_id,customer_name,visit_status,status_reason,visit_id,order_id,note",
    id: "eq." + sessionCustomerId,
    limit: 1
  });

  const sessionCustomer = rows[0];
  if (!sessionCustomer) throw badRequest("session_customer_not_found");

  let visit = null;
  let createdVisit = false;

  if (sessionCustomer.visit_id) {
    const existingVisits = await supabaseGet("mcp_visits", {
      select: "id,session_id,route_id,route_customer_id,status,has_order,has_test,has_report,checkin_at,note,created_at",
      id: "eq." + sessionCustomer.visit_id,
      limit: 1
    });
    visit = existingVisits[0] || null;
  }

  const hasOrder = toBool(body.hasOrder ?? body.has_order, resultType === "order" || Boolean(sessionCustomer.order_id) || Boolean(visit?.has_order));
  const hasTest = toBool(body.hasTest ?? body.has_test, resultType === "test" || Boolean(visit?.has_test));
  const hasReport = toBool(body.hasReport ?? body.has_report, resultType === "report" || Boolean(visit?.has_report));

  if (visit) {
    const updatedVisits = await supabasePatch("mcp_visits", {
      status: "visited",
      has_order: hasOrder,
      has_test: hasTest,
      has_report: hasReport,
      checkin_at: visit.checkin_at || now,
      note: note || visit.note || sessionCustomer.note || "Đã ghi kết quả",
      updated_at: now
    }, {
      id: "eq." + visit.id
    });
    visit = updatedVisits[0] || visit;
  } else {
    const insertedVisits = await supabaseInsert("mcp_visits", {
      id: randomId("mcv"),
      session_id: sessionCustomer.session_id,
      route_id: sessionCustomer.route_id,
      route_customer_id: sessionCustomer.route_customer_id,
      visit_date: todayDateOnly(),
      status: "visited",
      has_order: hasOrder,
      has_test: hasTest,
      has_report: hasReport,
      checkin_at: now,
      note: note || sessionCustomer.note || "Đã ghi kết quả",
      raw_payload: {
        source: "api_session_customer_result",
        session_customer_id: sessionCustomer.id,
        result_type: resultType || undefined,
        customer_id: sessionCustomer.customer_id,
        customer_name: sessionCustomer.customer_name
      }
    });
    visit = insertedVisits[0] || null;
    createdVisit = Boolean(visit);
  }

  const updatedSessionCustomers = await supabasePatch("mcp_session_customers", {
    visit_status: "visited",
    status_reason: null,
    visit_id: visit?.id || sessionCustomer.visit_id || null,
    order_id: orderId || sessionCustomer.order_id || null,
    note: note || sessionCustomer.note,
    updated_at: now
  }, {
    id: "eq." + sessionCustomer.id
  });

  const [visitedCount, orderCount, testCount, reportCount] = await Promise.all([
    supabaseCount("mcp_session_customers", { session_id: "eq." + sessionCustomer.session_id, visit_status: "eq.visited" }),
    supabaseCount("mcp_visits", { session_id: "eq." + sessionCustomer.session_id, has_order: "eq.true" }),
    supabaseCount("mcp_visits", { session_id: "eq." + sessionCustomer.session_id, has_test: "eq.true" }),
    supabaseCount("mcp_visits", { session_id: "eq." + sessionCustomer.session_id, has_report: "eq.true" })
  ]);

  await supabasePatch("mcp_route_sessions", {
    visited_customers: visitedCount,
    order_count: orderCount,
    test_count: testCount,
    report_count: reportCount,
    updated_at: now
  }, {
    id: "eq." + sessionCustomer.session_id
  });

  return {
    sessionCustomer: updatedSessionCustomers[0] || null,
    visit,
    createdVisit,
    counters: { visitedCount, orderCount, testCount, reportCount }
  };
}
`;

          if (!content.includes('async function updateMcpSessionCustomerResult(body)')) {
            const anchor = '\nasync function loadMcpDayData() {';
            const index = content.indexOf(anchor);
            if (index === -1) throw new Error('loadMcpDayData anchor not found');
            content = content.slice(0, index) + helper + content.slice(index);
          }

          if (!content.includes('/api/mcp-day/session-customer/result')) {
            const statusRoute = `  if (url.pathname === "/api/mcp-day/session-customer/status") {
    const body = await readJsonBody(req);
    return wrap(await updateMcpSessionCustomerStatus(body));
  }
`;
            const resultRoute = statusRoute + `
  if (url.pathname === "/api/mcp-day/session-customer/result") {
    const body = await readJsonBody(req);
    return wrap(await updateMcpSessionCustomerResult(body));
  }
`;
            if (!content.includes(statusRoute)) throw new Error('status route anchor not found');
            content = content.replace(statusRoute, resultRoute);
          }

          fs.writeFileSync(path, content);
          fs.unlinkSync('.github/workflows/patch-phase-8b3-compact.yml');
          NODE
      - name: Validate syntax
        run: node --check apps/backend/server.js
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "add mcp day result endpoint"
          git push

# trigger result endpoint patch
