name: Temporary Phase 8B3 Compact Patch
on:
  push:
    branches: [main]
    paths: [.github/workflows/patch-phase-8b3-compact.yml]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'apps/backend/server.js';
          const helpers = Buffer.from('))', 'base64').toString('utf8');
          const post = Buffer.from('', 'base64').toString('utf8');
          let content = fs.readFileSync(path, 'utf8');
          if (!content.includes('async function updateMcpSessionCustomerResult(body)')) {
            const anchor = '\nasync function loadMcpDayData() {';
            const i = content.indexOf(anchor);
            if (i < 0) throw new Error('anchor_not_found');
            content = content.slice(0, i) + helpers + content.slice(i);
          }
          if (!content.includes('/api/mcp-day/session-customer/result')) {
            const s = content.indexOf('async function handlePost(req, url) {');
            const e = content.indexOf('\nasync function handleGet(url) {', s);
            if (s < 0 || e < 0) throw new Error('post_not_found');
            content = content.slice(0, s) + post + content.slice(e);
          }
          fs.writeFileSync(path, content);
          for (const p of ['.github/workflows/patch-phase-8b3-compact.yml','.github/phase8b3/helpers01.b64','.github/phase8b3/helpers02a.b64']) {
            if (fs.existsSync(p)) fs.unlinkSync(p);
          }
          NODE
      - run: node --check apps/backend/server.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "add mcp day result and added customer endpoints"
          git push
