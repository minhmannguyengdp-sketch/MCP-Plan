name: PR Typecheck Diagnostic

on:
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - ".github/workflows/pr-typecheck-diagnostic.yml"

permissions:
  contents: read

jobs:
  typecheck-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture typecheck output
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-typecheck-diagnostic
          path: typecheck.log
          if-no-files-found: error
