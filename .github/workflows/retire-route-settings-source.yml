name: Retire Route Settings Source

on:
  push:
    branches:
      - a5-5-2-route-settings

permissions:
  contents: write

jobs:
  apply-retirement:
    if: github.event.head_commit.message != 'chore: retire dead route settings POST handlers'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: a5-5-2-route-settings
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply guarded transform
        run: |
          node scripts/retire-dead-route-settings.mjs
          node --check apps/backend/server.js
          git diff --check
          test "$(git diff --numstat -- apps/backend/server.js | awk '{print $1}')" = "0"
          test "$(git diff --numstat -- apps/backend/server.js | awk '{print $2}')" -gt "0"

      - name: Commit transformed source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/backend/server.js
          git commit -m "chore: retire dead route settings POST handlers"
          git push origin HEAD:a5-5-2-route-settings
