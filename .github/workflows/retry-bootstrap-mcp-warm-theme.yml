name: Retry MCP warm theme source bootstrap

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/retry-bootstrap-mcp-warm-theme.yml"

permissions:
  contents: write

jobs:
  apply-source-only:
    if: github.event.pull_request.head.ref == 'ui/mcp-warm-theme-live-actions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/mcp-warm-theme-live-actions
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Reuse reviewed bootstrap script
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent
          workflow = Path('.github/workflows/bootstrap-mcp-warm-theme-live-actions.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          script = dedent(workflow[start:end])
          exec(compile(script, 'bootstrap-mcp-warm-theme-live-actions', 'exec'))
          PY
      - name: Commit source, tests and docs only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add . ':!.github/workflows/**'
          git commit -m "fix: close session action caller gap and add warm theme tokens"
          git push origin HEAD:ui/mcp-warm-theme-live-actions
