name: Session Check-in Scanner Diagnostics

on:
  push:
    branches:
      - ui-session-checkin-modal-density

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-session-checkin-modal-density
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate direct mutation findings
        run: npm run audit:direct-db-mutation || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .tmp
          cp direct-db-mutation-findings.txt .tmp/session-checkin-findings.txt
          cp direct-db-mutation-findings.json .tmp/session-checkin-findings.json
          git add .tmp/session-checkin-findings.txt .tmp/session-checkin-findings.json
          git commit -m "Export session check-in scanner diagnostics"
          git push origin HEAD:ui-session-checkin-modal-density
