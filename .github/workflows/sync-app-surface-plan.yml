name: Sync app surface decision into master plan

on:
  push:
    branches:
      - docs/app-surface-subdomains
    paths:
      - docs/npp-plan/APP_SURFACE_SUBDOMAIN_DECISION.md
      - .github/workflows/sync-app-surface-plan.yml

permissions:
  contents: write

jobs:
  sync-master-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/app-surface-subdomains
          fetch-depth: 0

      - name: Insert locked app-surface decision
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('ke-hoach-app-van-hanh-npp.md')
          text = path.read_text(encoding='utf-8')
          title = '### 3.1. Giao diện app và subdomain đã khóa'
          if title in text:
              raise SystemExit(0)

          marker = '| NPP-09 | Cài đặt và phân quyền | [`docs/npp-plan/09-cai-dat-phan-quyen.md`](./docs/npp-plan/09-cai-dat-phan-quyen.md) | Foundation |\n'
          if marker not in text:
              raise SystemExit('master_plan_marker_not_found')

          section = '''

### 3.1. Giao diện app và subdomain đã khóa

Không tách 10 module nghiệp vụ thành 10 app. Kiến trúc giao diện cấp app được khóa như sau:

```text
sales.<domain>       Sale mobile / MCP
admin.<domain>       Điều hành và cấu hình
operations.<domain>  Kho + giao nhận
accounting.<domain>  Kế toán + công nợ
portal.<domain>      Cổng khách hàng — làm sau
api.<domain>         Backend API — không tính là giao diện
```

Quyết định:

- Có **4 giao diện nội bộ**; portal khách hàng là giao diện thứ 5 tùy chọn.
- **Kho và Giao nhận dùng chung `operations`**, nhưng Inventory và Delivery vẫn là hai domain, hai nguồn sự thật và permission riêng.
- **Kế toán dùng `accounting` riêng**; admin không mặc nhiên có quyền ghi sổ.
- Chỉ tách `delivery` riêng khi đội giao nhận độc lập, dùng 3PL hoặc quy mô vận hành đòi hỏi release/quyền riêng.
- Subdomain không thay thế backend permission; không nhân bản business logic giữa các giao diện.

Decision log: [`APP_SURFACE_SUBDOMAIN_DECISION.md`](./docs/npp-plan/APP_SURFACE_SUBDOMAIN_DECISION.md).
'''
          path.write_text(text.replace(marker, marker + section, 1), encoding='utf-8')
          PY

      - name: Commit synchronized master plan
        run: |
          if git diff --quiet -- ke-hoach-app-van-hanh-npp.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ke-hoach-app-van-hanh-npp.md
          git commit -m "docs: sync app surfaces into master plan"
          git push origin HEAD:docs/app-surface-subdomains
